<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WriterBoom - 需求提交成功</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#ffffff,#f8fafc);color:#0f172a;line-height:1.7;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
.container{max-width:1180px;margin:0 auto;padding:0 24px}
.header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:20px}
.brand{display:flex;align-items:center;gap:14px}
.logo{width:46px;height:46px;border-radius:18px;background:linear-gradient(135deg,#0f172a,#334155);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800}
.brand-title{font-size:18px;font-weight:800}
.brand-sub{font-size:12px;color:#64748b}
.nav{display:flex;gap:28px;color:#475569;font-size:14px}
.actions{display:flex;gap:12px}
.btn{border:1px solid #cbd5e1;background:#fff;color:#0f172a;border-radius:14px;padding:10px 16px;font-size:14px;cursor:pointer}
.btn-dark{background:#0f172a;color:#fff;border-color:#0f172a}
.main{flex:1;display:flex;align-items:center}
.hero{width:100%;padding:56px 0 72px}
.wrap{display:grid;grid-template-columns:1.02fr .98fr;gap:28px;align-items:center}
.badge{display:inline-flex;padding:8px 14px;border-radius:999px;background:#ecfdf5;border:1px solid #d1fae5;color:#047857;font-size:13px;margin-bottom:18px}
.big{font-size:72px;line-height:1;font-weight:800;letter-spacing:-2px;margin:0}
h2{margin:12px 0 0;font-size:34px;line-height:1.15;letter-spacing:-.8px}
.sub{margin-top:16px;color:#64748b;max-width:640px;font-size:18px}
.actions-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:28px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:30px;padding:24px;box-shadow:0 12px 28px rgba(15,23,42,.06)}
.card h3{margin:0 0 14px;font-size:24px}
.list{display:grid;gap:12px}
.item{border:1px solid #e2e8f0;border-radius:18px;padding:14px 16px;background:#fcfcfd}
.item strong{display:block;margin-bottom:4px}
.small{font-size:14px;color:#64748b}
.footer{border-top:1px solid #e2e8f0;background:#fff}
.footer-inner{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:22px 0 34px;color:#64748b;font-size:14px}
.footer-links{display:flex;gap:18px;flex-wrap:wrap}
@media(max-width:980px){.nav{display:none}.wrap{grid-template-columns:1fr}.big{font-size:56px}}
@media(max-width:720px){.actions{display:none}.big{font-size:44px}h2{font-size:28px}.sub{font-size:16px}}
</style>
</head>
<body>
<header class="header">
  <div class="container header-inner">
    <div class="brand">
      <div class="logo">WB</div>
      <div>
        <div class="brand-title">WriterBoom</div>
        <div class="brand-sub">3D打印共享平台</div>
      </div>
    </div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="merchant-list.html">找商家</a>
      <a href="request-print.html">发布需求</a>
      <a href="merchant-join.html">商家入驻</a>
      <a href="brand-guidelines.html">品牌规范</a>
    </nav>
    <div class="actions">
      <button class="btn" onclick="location.href='sitemap.html'">站点地图</button>
      <button class="btn btn-dark" onclick="location.href='index.html'">返回首页</button>
    </div>
  </div>
</header>
<main class="main">
  <section class="hero">
    <div class="container wrap">
      <div>
        <div class="badge">需求提交成功</div>
        <div class="big">提交成功</div>
        <h2>你的 3D 打印需求已经提交</h2>
        <div class="sub">商家后续可以根据你的模型、材料、数量和交期要求进行报价。你现在可以返回首页继续浏览，也可以去用户中心查看后续状态。</div>
        <div class="actions-row">
          <button class="btn btn-dark" onclick="location.href='user-center.html'">查看用户中心</button>
          <button class="btn" onclick="location.href='merchant-list.html'">继续找商家</button>
        </div>
      </div>
      <div class="card">
        <h3>下一步建议</h3>
        <div class="list">
          <div class="item"><strong>接下来会发生什么？</strong><div class="small">你的需求会进入平台原型流程，后续可以由商家查看并给出报价。</div></div>
          <div class="item"><strong>建议你做什么？</strong><div class="small">如果需求比较复杂，建议继续补充材料、公差、强度或用途说明。</div></div>
          <div class="item"><strong>在哪里查看状态？</strong><div class="small">你可以前往用户中心，后续这里会扩展成真实的需求与订单状态页。</div></div>
        </div>
      </div>
    </div>
  </section>
</main>
<footer class="footer">
  <div class="container footer-inner">
    <div>© 2026 WriterBoom.</div>
    <div class="footer-links">
      <a href="platform-rules.html">平台规则</a>
      <a href="privacy-policy.html">隐私政策</a>
      <a href="terms-of-service.html">用户协议</a>
    </div>
  </div>
</footer>
</body>
</html>
